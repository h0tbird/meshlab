---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: istio-istiod
  namespace: argocd
spec:
  generators:
  - clusters:
      selector:
        matchLabels:
          argocd.argoproj.io/secret-type: cluster
  template:
    metadata:
      name: {{`'{{name}}-istio-istiod'`}}
      labels:
        name: istio-istiod
    spec:
      project: istio
      source:
        repoURL: https://istio-release.storage.googleapis.com/charts
        targetRevision: {{ .Values.chartVersion }}
        chart: istiod
        helm:
          releaseName: istio-istiod
          valuesObject:
            profile: ambient
            revision: {{ .Values.chartVersion | replace "." "-" }}
            revisionTags: [ "stable", "canary", "default" ]
            pilot:
            # image: ghcr.io/h0tbird/pilot:1.28.3-patch.1-dev-debug
              autoscaleEnabled: false
              env:
                AUTO_RELOAD_PLUGIN_CERTS: true
                PILOT_ENABLE_WORKLOAD_ENTRY_AUTOREGISTRATION: true
                PILOT_ENABLE_WORKLOAD_ENTRY_HEALTHCHECKS: true
                # Inject the istio-proxy sidecar as a Kubernetes native
                # sidecar (initContainer with restartPolicy: Always, GA in
                # K8s 1.29). Guarantees Envoy is up before app containers
                # start and shuts down after them, fixing startup races and
                # Job/CronJob termination. Sidecar mode only; ambient is
                # unaffected.
                ENABLE_NATIVE_SIDECARS: "true"
                # Required for the sidecar east-west Gateway: the istio
                # GatewayClass treats Gateway-API "TLS" listeners as alpha
                # in 1.29.x, so PASSTHROUGH cross-network listeners on 15443
                # are otherwise rejected with UnsupportedProtocol.
                PILOT_ENABLE_ALPHA_GATEWAY_API: "true"
                ISTIOD_CUSTOM_HOST: {{`'istiod.{{name}}'`}}
                # Master switch for ambient cross-cluster endpoint
                # discovery. Despite the name, this is required even in
                # single-network mode (flat L3 via Cilium ClusterMesh) to
                # let ztunnel see remote-cluster ambient workloads. With
                # this off, ambient services are pinned to local-cluster
                # endpoints regardless of remote-secret federation.
                AMBIENT_ENABLE_MULTI_NETWORK: "true"
                AMBIENT_ENABLE_BAGGAGE: "true"
            global:
            # hub: ghcr.io/h0tbird
            # tag: 1.28.3-patch.1-dev
              variant: "debug"
              meshID: {{`'{{metadata.labels.cell}}'`}}
              # Kind clusters are configured with kubeadm
              # `networking.dnsDomain: <cell>.local`, so in-cluster service
              # FQDNs are e.g. foo.bar.svc.pasta.local. Override the istiod
              # chart default of cluster.local so istiod's --domain flag and
              # the proxy config it ships to sidecars/ztunnel match the
              # actual cluster DNS suffix.
              proxy:
                clusterDomain: {{`'{{metadata.labels.cell}}.local'`}}
{{- if eq .Values.networkMode "multi" }}
              network: {{`'{{name}}'`}}
{{- else if eq .Values.networkMode "single" }}
              network: {{`'{{metadata.labels.cell}}'`}}
{{- end }}
              logAsJson: true
              defaultPodDisruptionBudget:
                enabled: false
              multiCluster:
                enabled: true
                clusterName: {{`'{{name}}'`}}
            meshConfig:
              accessLogFile: /dev/stdout
              accessLogEncoding: JSON
              trustDomain: {{`'{{metadata.labels.cell}}.local'`}}
              defaultConfig:
                proxyMetadata:
                  ISTIO_META_DNS_CAPTURE: "true"
                  ISTIO_META_DNS_AUTO_ALLOCATE: "true"
              enableTracing: true
              extensionProviders:
              - name: otel-tracing
                opentelemetry:
                  port: 4318
                  service: otelco-cluster-opentelemetry-collector.monitoring.svc
                  http:
                    path: "/v1/traces"
                    timeout: 5s
                  resource_detectors:
                    environment: {}
      destination:
        server: {{`'{{server}}'`}}
        namespace: istio-system
